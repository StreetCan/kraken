<!doctype html>
<html lang="en">
  <head>

    <style>

        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        font-size: 1.75rem;

      }
      p {
        font-size: 1rem;

      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&apos;re offline</h1>
      <p>The Whispering Kraken experience isn&apos;t available right now. We&apos;ll reconnect you as soon as you&apos;re back online.</p>
    </div>
